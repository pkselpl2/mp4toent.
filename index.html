<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Video → Entry(.ent) 변환기</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{
  font-family: sans-serif;
  background:#f2f4f7;
  text-align:center;
  padding:40px;
}

.box{
  background:white;
  padding:30px;
  border-radius:12px;
  width:400px;
  margin:auto;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
  background:#ff6b6b;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#ff5252;
}

progress{
  width:100%;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="box">

<h2>🎬 Video → Entry 변환기</h2>

<input type="file" id="videoFile" accept="video/*">

<br><br>

<button onclick="convert()">변환 후 다운로드</button>

<br>

<progress id="progress" value="0" max="100"></progress>

</div>

<script>

async function convert(){

const file = document.getElementById("videoFile").files[0];
if(!file){
alert("동영상을 선택해줘!");
return;
}

const zip = new JSZip();

const video = document.createElement("video");
video.src = URL.createObjectURL(file);

await video.play().catch(()=>{});
video.pause();

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const fps = 10;
const frames = Math.floor(video.duration * fps);

const imageFolder = zip.folder("temp/assets/image");

for(let i=0;i<frames;i++){

video.currentTime = i/fps;

await new Promise(r=>video.onseeked=r);

ctx.drawImage(video,0,0);

const blob = await new Promise(r=>canvas.toBlob(r,"image/png"));

imageFolder.file(`frame_${i}.png`,blob);

document.getElementById("progress").value =
(i/frames)*100;

}

const project = {

objects:[
{
name:"videoObject",
costumes: frames
}
]

};

zip.folder("temp").file(
"project.json",
JSON.stringify(project,null,2)
);

const content = await zip.generateAsync({type:"blob"});

const a = document.createElement("a");
a.href = URL.createObjectURL(content);
a.download = "project.ent";
a.click();

document.getElementById("progress").value = 100;

}

</script>

</body>
</html>
